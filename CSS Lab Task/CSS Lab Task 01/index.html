<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lab Task 01 - CSS Introduction</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Internal CSS -->
    <style>
        /* 
        Internal CSS 
        */

        h2 {
            color: darkblue;
            text-align: center;
        }

        p {
            font-size: 18px;
            font-family: Arial, sans-serif;
        }

        .highlight {
            background-color: yellow;
        }
    </style>
</head>
<body>

    <!-- ID Selector -->
    <h1 id="mainTitle">Welcome Sazid</h1>

    <h2>Learning CSE is just wow</h2>

    <!-- Inline CSS -->
    <p style="color: red;">
        This paragraph is styled using Inline CSS.
    </p>

    <p>
        This paragraph is styled using Internal CSS.
    </p>

    <!-- Class Selector -->
    <p class="highlight">
        This paragraph uses the class selector.
    </p>

</body>
</html>
